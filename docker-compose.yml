services:
  # 1. MariaDB (정형 데이터 영구 저장)
  mariadb:
    image: mariadb:10.11
    container_name: fds-mariadb
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: fds_db
      MYSQL_USER: fds_user
      MYSQL_PASSWORD: fdspassword
    deploy:
      resources:
        limits:
          memory: 2G

  # 2. Redis (빈번하게 조회되는 데이터 캐싱)
  redis:
    image: redis:7.2
    container_name: fds-redis
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 1G

  # 3. Kafka (Apache 공식 이미지 / KRaft 모드)
  kafka:
    image: apache/kafka:3.7.0
    container_name: fds-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
    deploy:
      resources:
        limits:
          memory: 2G